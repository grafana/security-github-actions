name: Socket - Add exclusion label to repo

on:
  workflow_dispatch:
    inputs:
      repository-name:
        description: Name of the Socket repository to add the exclusion label to
        required: true
      slack-channel-id:
        description: Slack channel ID to post the run notification to
        required: false

env:
  DEFAULT_SLACK_CHANNEL: C05A6NW2JF6

permissions:
  id-token: write
  contents: read
  actions: read

jobs:
  add-exclusion-label:
    name: Add Socket exclusion label to repo
    runs-on: ubuntu-latest
    steps:
      - name: Get vault secrets
        id: vault-secrets
        uses: grafana/shared-workflows/actions/get-vault-secrets@a37de51f3d713a30a9e4b21bcdfbd38170020593 # get-vault-secrets/v1.3.0
        with:
          vault_instance: dev
          repo_secrets: |
            SOCKET_API_KEY=socket:SOCKET_API_KEY
          export_env: false

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Add exclusion label to repo
        uses: ./socket/cmd/socket/add-exclusion-label-to-repo
        with:
          socket_api_token: ${{ fromJSON(steps.vault-secrets.outputs.secrets).SOCKET_API_KEY }}
          socket_org: grafana
          repository_name: ${{ inputs.repository-name }}

      - name: Send Slack notification
        uses: grafana/shared-workflows/actions/send-slack-message@send-slack-message/v2.0.4
        with:
          method: chat.postMessage
          payload: |
            {
              "channel": "${{ inputs.slack-channel-id || env.DEFAULT_SLACK_CHANNEL }}",
              "text": "Socket exclusion label added to repo `${{ inputs.repository-name }}`"
            }
          payload-templated: false
