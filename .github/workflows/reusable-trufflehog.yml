name: Reusable TruffleHog Secret Scan

on:
  workflow_call:
    inputs:
      fail-on-verified:
        description: "Fail workflow on verified secrets"
        required: false
        default: "true"
        type: string
      fail-on-unverified:
        description: "Fail workflow on unverified secrets"
        required: false
        default: "false"
        type: string
      runs-on:
        description: "The runner to use for the job"
        required: false
        default: "ubuntu-latest"
        type: string
      send-bench-metrics:
        description: "If true, run Grafana Bench after scan (requires Vault Prometheus creds). Job only runs for grafana org and non-fork PRs; fork PRs have no OIDC/Vault access."
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  pull-requests: write

env:
  # renovate: datasource=github-releases depName=trufflesecurity/trufflehog
  TRUFFLEHOG_VERSION: v3.94.0

jobs:
  trufflehog-scan:
    runs-on: ${{ inputs.runs-on }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: Fetch base and head commits
        if: github.event_name == 'pull_request'
        run: git fetch --depth=1 origin ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }}

      - name: Remove persisted credentials
        run: git config --unset-all http.https://github.com/.extraheader

      - name: Fetch org-wide TruffleHog exclude patterns
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DEST=/tmp/trufflehog-exclude.txt
          REPO=grafana/security-github-actions
          REF=main
          # Exclusions: edit trufflehog/prefixes.txt, run ./trufflehog/update-excludes.sh, commit prefixes + global-exclude.txt
          RAW_BASE="https://raw.githubusercontent.com/grafana/security-github-actions/${REF}/trufflehog"
          RAW_URL="${RAW_BASE}/global-exclude.txt"
          RAW_BUILD="${RAW_BASE}/build_exclude_file.py"
          RAW_PREFIXES="${RAW_BASE}/prefixes.txt"
          if gh api "repos/${REPO}/contents/trufflehog/global-exclude.txt?ref=${REF}" \
              -H "Accept: application/vnd.github.v3.raw" -o "${DEST}" 2>/dev/null && [[ -s "${DEST}" ]]; then
            echo "Loaded exclude patterns from ${REPO}@${REF} (GitHub API)"
          elif curl -fsSL "${RAW_URL}" -o "${DEST}" 2>/dev/null && [[ -s "${DEST}" ]]; then
            echo "Loaded exclude patterns from raw.githubusercontent.com (${REF})"
          elif gh api "repos/${REPO}/contents/trufflehog/build_exclude_file.py?ref=${REF}" \
              -H "Accept: application/vnd.github.v3.raw" -o /tmp/trufflehog_build_exclude_file.py 2>/dev/null \
            && gh api "repos/${REPO}/contents/trufflehog/prefixes.txt?ref=${REF}" \
              -H "Accept: application/vnd.github.v3.raw" -o /tmp/trufflehog_prefixes.txt 2>/dev/null \
            && python3 /tmp/trufflehog_build_exclude_file.py /tmp/trufflehog_prefixes.txt > "${DEST}" 2>/dev/null \
            && [[ -s "${DEST}" ]]; then
            echo "Built exclude file from build_exclude_file.py + prefixes.txt (${REPO}@${REF}, GitHub API)"
          elif curl -fsSL "${RAW_BUILD}" -o /tmp/trufflehog_build_exclude_file.py 2>/dev/null \
            && curl -fsSL "${RAW_PREFIXES}" -o /tmp/trufflehog_prefixes.txt 2>/dev/null \
            && python3 /tmp/trufflehog_build_exclude_file.py /tmp/trufflehog_prefixes.txt > "${DEST}" 2>/dev/null \
            && [[ -s "${DEST}" ]]; then
            echo "Built exclude file from build_exclude_file.py + prefixes.txt (raw GitHub)"
          else
            echo "::warning::Could not fetch or rebuild TruffleHog excludes from ${REPO}@${REF}. Using last-resort bundled file — merge to main or fix token access."
            # Last resort only: must match stdout of python3 trufflehog/build_exclude_file.py (same commit).
            cat > "${DEST}" <<'EOF'
          # Generated — do not edit by hand. Edit trufflehog/prefixes.txt then run ./trufflehog/update-excludes.sh
          #
          # --- directory prefixes (from prefixes.txt) ---
          # prefix: vendor
          (^|\./|[/\\])vendor([/\\]|$)
          # prefix: content/grafana/dashboards
          (^|\./|[/\\])content/grafana/dashboards([/\\]|$)

          # --- static path patterns ---
          # Lock files and checksums (contain hashes, not secrets)
          path:go\.sum$
          path:go\.mod$

          # Dependency manifests (contain URLs that trigger false positives)
          path:package\.json$
          path:package-lock\.json$
          path:pnpm-lock\.yaml$
          path:yarn\.lock$
          path:poetry\.lock$
          path:Pipfile\.lock$
          path:uv\.lock$
          path:Cargo\.lock$
          path:Gemfile\.lock$

          # Grafana plugin metadata
          path:grafana\.json$
          EOF
          fi
          echo "--- effective exclude file ---"
          cat "${DEST}"

      - name: Install TruffleHog
        run: |
          # Download binary directly from GitHub releases for supply chain security
          echo "Using Trufflehog version: $TRUFFLEHOG_VERSION"
          # Auto-detect architecture for cross-platform support
          if [[ "$(uname -m)" == "aarch64" ]]; then
            ARCH="linux_arm64"
          else
            ARCH="linux_amd64"
          fi
          BINARY_URL="https://github.com/trufflesecurity/trufflehog/releases/download/${TRUFFLEHOG_VERSION}/trufflehog_${TRUFFLEHOG_VERSION#v}_${ARCH}.tar.gz"

          curl -sSfL "${BINARY_URL}" | tar -xz -C /tmp
          sudo mv /tmp/trufflehog /usr/local/bin/trufflehog
          sudo chmod +x /usr/local/bin/trufflehog
          trufflehog --version

      - name: Scan for secrets
        id: scan
        run: |
          set +e
          echo "[]" > results.json

          # Classify paths vs /tmp/trufflehog-exclude.txt (Python re ~ TruffleHog Go regexp for our patterns).
          cat > /tmp/trufflehog_exclude_helpers.py <<'ENDHELPER'
          import re
          import subprocess
          import sys
          from pathlib import Path

          MANIFEST = frozenset({
              "go.sum", "go.mod", "package.json", "package-lock.json", "pnpm-lock.yaml",
              "yarn.lock", "poetry.lock", "Pipfile.lock", "uv.lock", "Cargo.lock",
              "Gemfile.lock", "grafana.json",
          })

          _PATS = None

          def load_patterns():
              global _PATS
              if _PATS is not None:
                  return _PATS
              pats = []
              p = Path("/tmp/trufflehog-exclude.txt")
              if not p.is_file():
                  _PATS = pats
                  return pats
              for line in p.read_text().splitlines():
                  line = line.strip()
                  if not line or line.startswith("#"):
                      continue
                  try:
                      pats.append(re.compile(line))
                  except re.error:
                      print(f"::warning::Invalid regex in exclude file (ignored for skip log): {line!r}", file=sys.stderr)
              _PATS = pats
              return pats

          def vendor_skip(path: str) -> bool:
              return (
                  path.startswith("vendor/")
                  or path.startswith("./vendor/")
                  or "/vendor/" in path
              )

          def manifest_skip(path: str) -> bool:
              return Path(path).name in MANIFEST

          def exclude_match(path: str):
              for r in load_patterns():
                  if r.search(path):
                      return r.pattern
              return None

          def main():
              cmd = sys.argv[1]
              if cmd == "match":
                  path = sys.argv[2]
                  m = exclude_match(path)
                  if m:
                      print(m)
                      sys.exit(0)
                  sys.exit(1)
              if cmd == "report-pr":
                  cfp = Path("changed-files.txt")
                  lines = [ln.strip() for ln in cfp.read_text().splitlines() if ln.strip()] if cfp.is_file() else []
                  sk_v, sk_m, sk_e, scan = [], [], [], []
                  for f in lines:
                      if vendor_skip(f):
                          sk_v.append(f)
                      elif manifest_skip(f):
                          sk_m.append(f)
                      else:
                          pat = exclude_match(f)
                          if pat:
                              sk_e.append((f, pat))
                          else:
                              scan.append(f)
                  def block(title, items, detail=False):
                      print(f"{title} ({len(items)}):")
                      for x in items[:500]:
                          if detail:
                              print(f"  - {x[0]}  (regex: {x[1]})")
                          else:
                              print(f"  - {x}")
                      if len(items) > 500:
                          print(f"  ... and {len(items) - 500} more")

                  print("")
                  print("=== TruffleHog exclusion report (PR changed files) ===")
                  block("Skipped — Go vendor/", sk_v)
                  block("Skipped — manifest / lock basename", sk_m)
                  block("Skipped — exclude file regex", sk_e, detail=True)
                  block("Will run TruffleHog on", scan)
                  print("=== End exclusion report ===")
                  print("")
                  return
              if cmd == "report-push":
                  r = subprocess.run(["git", "ls-files"], capture_output=True, text=True, check=False)
                  paths = [ln.strip() for ln in r.stdout.splitlines() if ln.strip()]
                  matched = [(p, exclude_match(p)) for p in paths if exclude_match(p)]
                  print("")
                  print(f"=== Sample: tracked paths matching exclude regexes ({len(matched)} total, show first 200) ===")
                  for p, pat in matched[:200]:
                      print(f"  - {p}  (regex: {pat})")
                  if len(matched) > 200:
                      print(f"  ... and {len(matched) - 200} more")
                  print("(Untracked files can also match; TruffleHog still applies excludes on full scan.)")
                  print("=== End exclude sample ===")
                  print("")
                  return
              print("unknown command", cmd, file=sys.stderr)
              sys.exit(1)

          if __name__ == "__main__":
              main()
          ENDHELPER

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            # PR: Scan only changed files (using two-dot diff with explicit base SHA)
            echo "Scanning changed files in PR..."
            git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} > changed-files.txt

            if [[ -s changed-files.txt ]]; then
              python3 /tmp/trufflehog_exclude_helpers.py report-pr
              while IFS= read -r file; do
                if [[ "$file" == vendor/* || "$file" == */vendor/* || "$file" == ./vendor/* ]]; then
                  echo "Skipping: ${file} (Go vendor directory)"
                  continue
                fi

                # Get just the filename
                filename=$(basename "$file")

                # Skip excluded files (use case statement for cleaner matching)
                case "$filename" in
                  go.sum|go.mod|package.json|package-lock.json|pnpm-lock.yaml|yarn.lock|poetry.lock|Pipfile.lock|uv.lock|Cargo.lock|Gemfile.lock|grafana.json)
                    echo "Skipping: ${file} (excluded manifest/lock file)"
                    continue
                    ;;
                esac

                if pat=$(python3 /tmp/trufflehog_exclude_helpers.py match "$file" 2>/dev/null); then
                  echo "Skipping: ${file} (exclude file regex: ${pat})"
                  continue
                fi

                if [[ -f "${file}" ]]; then
                  echo "Scanning: ${file}"
                  trufflehog filesystem "${file}" --exclude-paths /tmp/trufflehog-exclude.txt --concurrency 16 --json --no-update --results=verified,unverified >> results.ndjson || true
                fi
              done < changed-files.txt
            else
              echo "No files changed"
            fi
          else
            # Push to main: Scan current filesystem
            echo "Scanning current filesystem..."
            python3 /tmp/trufflehog_exclude_helpers.py report-push
            trufflehog filesystem . --exclude-paths /tmp/trufflehog-exclude.txt --concurrency 16 --json --no-update --results=verified,unverified > results.ndjson || true
          fi

          # Process results and filter git hashes from CHANGELOG files
          if [[ -s results.ndjson ]]; then
            # Filter out non-JSON lines (like log messages) - only keep lines that start with {
            TEMP_FILTERED=$(mktemp)
            grep -v '^$' results.ndjson | grep '^{' > "${TEMP_FILTERED}" || true
            
            if [[ -s "${TEMP_FILTERED}" ]]; then
              # Convert NDJSON to JSON array
              if jq -R 'fromjson?' "${TEMP_FILTERED}" 2>/dev/null | jq -s '.' > results.json 2>&1; then
                # Filter out CHANGELOG git hashes if we have results
                if jq -e 'length > 0' results.json >/dev/null 2>&1; then
                  jq '[.[] | select(
                    ((.SourceMetadata?.Data?.Filesystem?.file // .SourceMetadata?.Data?.Git?.file) // "") as $file |
                    !(($file | test("CHANGELOG|HISTORY\\.md|NEWS\\.md"; "i")) and (.Raw | test("^[0-9a-f]{7,40}$"; "i")))
                  )]' results.json > results.json.tmp && mv results.json.tmp results.json
                fi
              else
                echo "[]" > results.json
              fi
            else
              echo "[]" > results.json
            fi
            
            rm -f "${TEMP_FILTERED}"
          else
            echo "[]" > results.json
          fi

          # Count secrets
          if jq empty results.json 2>/dev/null; then
            VERIFIED=$(jq '[.[] | select(.Verified==true)] | length' results.json 2>/dev/null || echo "0")
            UNVERIFIED=$(jq '[.[] | select(.Verified==false)] | length' results.json 2>/dev/null || echo "0")
          else
            VERIFIED=0
            UNVERIFIED=0
            echo "[]" > results.json
          fi

          TOTAL=$((VERIFIED+UNVERIFIED))
          echo "Found ${TOTAL} potential secrets (${VERIFIED} verified, ${UNVERIFIED} unverified)"

          echo "verified=${VERIFIED}" >> "${GITHUB_OUTPUT}"
          echo "unverified=${UNVERIFIED}" >> "${GITHUB_OUTPUT}"
          echo "total=${TOTAL}" >> "${GITHUB_OUTPUT}"

      - name: Delete resolved comment
        if: ${{ !cancelled() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && steps.scan.outputs.total == '0' }}
        run: |
          # Find and delete TruffleHog comment if secrets have been resolved
          COMMENT_ID=$(gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments --jq '.[] | select(.body | contains("<!-- trufflehog-secret-scan-comment -->")) | .id' | head -1 || echo "")

          if [[ -n "$COMMENT_ID" ]]; then
            echo "Secrets resolved - deleting previous warning comment (ID: ${COMMENT_ID})"
            gh api -X DELETE /repos/${{ github.repository }}/issues/comments/${COMMENT_ID}
            echo "Comment deleted successfully"
          else
            echo "No existing TruffleHog comment to delete"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Generate PR comment
        if: ${{ !cancelled() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && steps.scan.outputs.total > 0 }}
        id: comment-body
        run: |
          VERIFIED=${{ steps.scan.outputs.verified }}
          UNVERIFIED=${{ steps.scan.outputs.unverified }}
          TOTAL=$((VERIFIED+UNVERIFIED))

          if [[ $TOTAL -eq 0 ]]; then
            {
              echo 'body<<EOF'
              echo '**TruffleHog Scan Results** ✅'
              echo ''
              echo 'No secrets detected. All clear!'
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          else
            # Generate findings list
            FINDINGS=$(jq -r '.[] |
              "- " +
              (if .Verified then "**VERIFIED SECRET**" else "**Possible secret**" end) +
              " (" + .DetectorName + ") at `" +
              ((.SourceMetadata?.Data?.Filesystem?.file // .SourceMetadata?.Data?.Git?.file) // "unknown") +
              ":" +
              ((.SourceMetadata?.Data?.Filesystem?.line // .SourceMetadata?.Data?.Git?.line) | tostring) +
              "` → `" +
              (if (.Raw | length) > 8 then (.Raw[:4] + "***" + .Raw[-4:]) else "***" end) +
              "`"' results.json 2>/dev/null || echo "- Error processing results")

            ACTION_TEXT=""
            if [[ $VERIFIED -gt 0 ]]; then
              ACTION_TEXT="**ACTION REQUIRED:** Rotate verified credentials immediately."
            else
              ACTION_TEXT="**Review:** Check if unverified secrets are false positives."
            fi

            {
              echo 'body<<EOF'
              echo "**TruffleHog Scan Results**"
              echo ''
              echo "**Summary:** Found ${TOTAL} potential secrets (${VERIFIED} verified, ${UNVERIFIED} unverified)"
              echo ''
              echo "${FINDINGS}"
              echo ''
              echo "${ACTION_TEXT}"
              echo ''
              echo '---'
              echo ''
              echo '**Ignoring False Positives:**'
              echo 'To mark a false positive, add `# trufflehog:ignore` as an inline comment on the same line as the detected secret:'
              echo '```'
              echo 'my_fake_secret = "AKIAIOSFODNN7EXAMPLE"  # trufflehog:ignore'
              echo '```'
              echo 'This works for files that support line numbers (most source files). After adding the comment, push your changes and the scan will re-run.'
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Post PR comment
        if: ${{ always() && !cancelled() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && steps.comment-body.outcome == 'success' && steps.scan.outputs.total > 0 }}
        uses: mshick/add-pr-comment@b8f338c590a895d50bcbfa6c5859251edc8952fc # v2.8.2
        with:
          # We retain the final trufflehog-secret-scan-comment marker in case we want to chang the action to another one.
          message: |
            ${{ steps.comment-body.outputs.body }}
            <!-- trufflehog-secret-scan-comment -->
          message-id: trufflehog-secret-scan-comment

      - name: Create scan report
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          {
            echo "TruffleHog Scan Report"
            echo "====================="
            echo "Date: $(date)"
            echo "Repository: ${{ github.repository }}"
            echo "Branch: ${GITHUB_REF_NAME}"
            echo "Commit: ${{ github.sha }}"
            echo ""
            echo "Summary:"
            echo "- Total secrets: ${{ steps.scan.outputs.total }}"
            echo "- Verified: ${{ steps.scan.outputs.verified }}"
            echo "- Unverified: ${{ steps.scan.outputs.unverified }}"
            echo ""
            echo "Detailed Results:"
            if [[ -f "results.json" && -s "results.json" ]] && jq empty results.json 2>/dev/null; then
              jq -r '.[] | "- " + (if .Verified then "VERIFIED" else "Unverified" end) + " " + .DetectorName + " at " + ((.SourceMetadata?.Data?.Filesystem?.file // .SourceMetadata?.Data?.Git?.file) // "unknown") + ":" + ((.SourceMetadata?.Data?.Filesystem?.line // .SourceMetadata?.Data?.Git?.line) | tostring) + " → " + (if (.Raw | length) > 8 then (.Raw[:4] + "***" + .Raw[-4:]) else "***" end)' results.json 2>/dev/null || echo "Error processing results"
            else
              echo "No secrets detected"
            fi
          } > trufflehog_scan.txt

      - name: Upload scan results
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        if: always()
        with:
          name: trufflehog_scan
          path: |
            trufflehog_scan.txt
            results.json
          if-no-files-found: warn
          retention-days: 2

      - name: Check failure policy
        env:
          FAIL_ON_VERIFIED: ${{ inputs.fail-on-verified }}
          FAIL_ON_UNVERIFIED: ${{ inputs.fail-on-unverified }}
          VERIFIED_COUNT: ${{ steps.scan.outputs.verified }}
          UNVERIFIED_COUNT: ${{ steps.scan.outputs.unverified }}
        run: |
          SHOULD_FAIL=false
          if [[ "${FAIL_ON_VERIFIED}" == "true" && "${VERIFIED_COUNT}" != "0" && -n "${VERIFIED_COUNT}" ]]; then
            SHOULD_FAIL=true
          fi
          if [[ "${FAIL_ON_UNVERIFIED}" == "true" && "${UNVERIFIED_COUNT}" != "0" && -n "${UNVERIFIED_COUNT}" ]]; then
            SHOULD_FAIL=true
          fi

          if [[ "${SHOULD_FAIL}" == "true" ]]; then
            echo "Workflow failed due to secrets found (verified: ${VERIFIED_COUNT}, unverified: ${UNVERIFIED_COUNT})"
            exit 1
          fi

  grafana-bench:
    name: Send TruffleHog metrics to Prometheus via Grafana Bench
    needs: [trufflehog-scan]
    # Only run for grafana org and non-fork PRs (fork PRs have no OIDC/Vault access).
    if: ${{ github.repository_owner == 'grafana' && (github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork) && inputs.send-bench-metrics && always() && !cancelled() && (needs.trufflehog-scan.result == 'success' || needs.trufflehog-scan.result == 'failure') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Get Prometheus secrets from Vault
        uses: grafana/shared-workflows/actions/get-vault-secrets@078c4a8af09e06d646077550f9e0f68171d5881e # get-vault-secrets/v1.3.1
        with:
          common_secrets: |
            PROMETHEUS_URL=grafana-bench:prometheus_url
            PROMETHEUS_USER=grafana-bench:prometheus_user
            PROMETHEUS_PASSWORD=grafana-bench:prometheus_token

      - name: Download TruffleHog scan artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: trufflehog_scan

      - name: Send TruffleHog metrics to Prometheus via Grafana Bench
        env:
          BENCH_SERVICE: ${{ format('grafana-{0}', github.event.repository.name) }}
          BENCH_SUITE_NAME: ${{ github.event.repository.name }}/trufflehog
          BENCH_SERVICE_VERSION: ${{ github.sha }}
        run: |
          if [ -z "${PROMETHEUS_URL}" ]; then
            echo "::error::PROMETHEUS_URL not set; Vault step may have failed."
            exit 1
          fi
          if ! docker pull ghcr.io/grafana/grafana-bench:v1.0.4; then
            echo "Could not pull Bench image; skipping bench step."
            exit 0
          fi
          docker run --rm \
            --network=host \
            --volume="${PWD}:/tests/" \
            -e PROMETHEUS_URL="${PROMETHEUS_URL}" \
            -e PROMETHEUS_USER="${PROMETHEUS_USER}" \
            -e PROMETHEUS_PASSWORD="${PROMETHEUS_PASSWORD}" \
            ghcr.io/grafana/grafana-bench:v1.0.4 report \
            --report-input trufflehog \
            --service "${BENCH_SERVICE}" \
            --service-version "${BENCH_SERVICE_VERSION}" \
            --suite-name "${BENCH_SUITE_NAME}" \
            --run-stage ci \
            --report-output log \
            --log-level debug \
            --prometheus-metrics \
            /tests/results.json
