name: Socket - Sync exclusion labels

on:
  schedule:
    - cron: '0 6 * * *'  # daily at 06:00 UTC
  workflow_dispatch:
    inputs:
      github-topic:
        description: GitHub topic that marks repos for Socket license policy exclusion
        required: false
        default: socket-exclude
      slack-channel-id:
        description: Slack channel ID to post the run notification to
        required: false

env:
  DEFAULT_SLACK_CHANNEL: C05A6NW2JF6

permissions:
  id-token: write
  contents: read
  actions: read

jobs:
  sync-exclusion-labels:
    name: Sync Socket exclusion labels
    runs-on: ubuntu-latest
    steps:
      - name: Get vault secrets
        id: vault-secrets
        uses: grafana/shared-workflows/actions/get-vault-secrets@a37de51f3d713a30a9e4b21bcdfbd38170020593 # get-vault-secrets/v1.3.0
        with:
          vault_instance: dev
          repo_secrets: |
            SOCKET_API_KEY=socket:SOCKET_API_KEY
          export_env: false

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Sync exclusion labels
        uses: ./socket/cmd/socket/sync-exclusion-labels
        with:
          socket_api_token: ${{ fromJSON(steps.vault-secrets.outputs.secrets).SOCKET_API_KEY }}
          socket_org: grafana
          github_token: ${{ secrets.GITHUB_TOKEN }}
          github_org: grafana
          github_topic: ${{ inputs.github-topic || 'socket-exclude' }}

      - name: Send Slack notification
        if: always()
        uses: grafana/shared-workflows/actions/send-slack-message@send-slack-message/v2.0.4
        with:
          method: chat.postMessage
          payload: |
            {
              "channel": "${{ inputs.slack-channel-id || env.DEFAULT_SLACK_CHANNEL }}",
              "text": "Socket exclusion label sync completed (topic: `${{ inputs.github-topic || 'socket-exclude' }}`)"
            }
          payload-templated: false
