name: TruffleHog Secret Scanning

# This workflow is designed to be enforced org-wide via GitHub rulesets
# It calls the reusable TruffleHog workflow with sensible defaults for org-wide deployment

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
  merge_group:
    types: [checks_requested]

permissions:
  contents: read
  pull-requests: write
  checks: write
  id-token: write

jobs:
  secret-scan:
    name: TruffleHog Secret Scan
    uses: grafana/security-github-actions/.github/workflows/reusable-trufflehog.yml@c99180caef50a3654894131e8291ad6f52df9ad3 # main
    with:
      # Non-blocking: job succeeds; PR still gets comments/artifacts when findings exist
      fail-on-verified: "false"      # Set "true" to fail on verified secrets
      fail-on-unverified: "false"    # Set "true" to fail on unverified secrets
      runs-on: ${{ !github.event.repository.private && 'ubuntu-latest' || 'ubuntu-arm64-small' }}    # Use same runner pattern as zizmor
    secrets: inherit
