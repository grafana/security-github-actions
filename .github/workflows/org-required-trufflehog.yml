name: TruffleHog Secret Scanning

# This workflow is designed to be enforced org-wide via GitHub rulesets
# It calls the reusable TruffleHog workflow with sensible defaults for org-wide deployment

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
  merge_group:
    types: [checks_requested]

permissions:
  contents: read
  pull-requests: write
  checks: write
  id-token: write   # required for grafana-bench job in reusable workflow (GAR OIDC login)

jobs:
  secret-scan:
    name: TruffleHog Secret Scan
    uses: grafana/security-github-actions/.github/workflows/reusable-trufflehog.yml@trufflehog-poc
    with:
      # Fail on verified secrets - blocking mode
      fail-on-verified: "false"      # Block on verified secrets
      fail-on-unverified: "false"    # Don't block on unverified secrets
      runs-on: ${{ !github.event.repository.private && 'ubuntu-latest' || 'ubuntu-arm64-small' }}    # Use same runner pattern as zizmor
      # Build and run Bench from grafana-bench branch (TruffleHog parser not in released image yet)
      bench-ref: "trufflehog-poc"
    secrets: inherit
