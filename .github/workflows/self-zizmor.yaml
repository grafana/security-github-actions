name: zizmor GitHub Actions static analysis
on:
  push:
  pull_request:
    types:
      - edited
      - opened
      - ready_for_review
      - synchronize
      - reopened
  merge_group:
    types: [checks_requested]
jobs:
  zizmor-check:
    name: Check whether there are things to scan
    permissions:
      contents: read
    runs-on: ${{ !github.event.repository.private && 'ubuntu-latest' || 'ubuntu-arm64-small' }}
    outputs:
      found-files: ${{ steps.zizmor-check.outputs.found-files }}
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
      - name: Run zizmor
        id: zizmor-check
        shell: bash
        run: |
          FOUND_FILES=false
          SEARCH=$(find . -path "**/.github/workflows/*.yml" -o -path "**/.github/workflows/*.yaml" -o -path "**/action.yml" -o -path "**/action.yaml")
          if [ -n "$SEARCH" ]; then
              FOUND_FILES=true
          fi
          echo "found-files=${FOUND_FILES}" >> $GITHUB_OUTPUT
  zizmor:
    name: Run zizmor

    permissions:
      actions: read
      contents: read
      id-token: write
      pull-requests: write
      security-events: write

    needs:
      - zizmor-check
    if: ${{ needs.zizmor-check.outputs.found-files == 'true' }}

    uses: grafana/shared-workflows/.github/workflows/reusable-zizmor.yml@34c8c8ac9e893f60b1f64121dd885c395fd0e642
    with:
      runs-on: ${{ !github.event.repository.private && 'ubuntu-latest' || 'ubuntu-arm64-small' }}
      fail-severity: high
      min-severity: high
      min-confidence: low
      extra-args: --offline
      # Only send metrics from grafana org; fork PRs don't have OIDC/Vault access.
      send-bench-metrics: ${{ github.repository_owner == 'grafana' }}
    # Grafana Bench: reusable workflow fetches Prometheus creds from Vault when send-bench-metrics is true (grafana org only).
    # Requires: repo in grafana org; Vault OIDC role allows this repo to read grafana-bench (prometheus_url, prometheus_user, prometheus_token).
    secrets: inherit
