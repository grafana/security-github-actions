name: zizmor GitHub Actions static analysis
on:
  push:
  pull_request:
    types:
      - edited
      - opened
      - ready_for_review
      - synchronize
      - reopened
  merge_group:
    types: [checks_requested]

env:
  # Configurable list of GitHub actions to detect and warn about
  # JSON format: [{"action": "org/repo", "message": "Custom warning message"}]
  WATCHED_ACTIONS: |
    [
      {
        "action": "actions/create-github-app-token",
        "message": "This action will be deprecated. Please migrate to GitHub App Token Broker: https://enghub.grafana-ops.net/docs/default/component/deployment-tools/platform/vault/github-app-token-broker-migration-guide/"
      }
    ]

jobs:
  zizmor-check:
    name: Check whether there are things to scan
    permissions:
      contents: read
    runs-on: ${{ !github.event.repository.private && 'ubuntu-latest' || 'ubuntu-arm64-small' }}
    outputs:
      found-files: ${{ steps.zizmor-check.outputs.found-files }}
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
      - name: Run zizmor
        id: zizmor-check
        shell: bash
        run: |
          FOUND_FILES=false
          SEARCH=$(find . -path "**/.github/workflows/*.yml" -o -path "**/.github/workflows/*.yaml" -o -path "**/action.yml" -o -path "**/action.yaml")
          if [ -n "$SEARCH" ]; then
              FOUND_FILES=true
          fi
          echo "found-files=${FOUND_FILES}" >> $GITHUB_OUTPUT

      - name: Detect specific GitHub actions
        if: steps.zizmor-check.outputs.found-files == 'true'
        shell: bash
        env:
          WATCHED_ACTIONS: ${{ env.WATCHED_ACTIONS }}
        run: |
          echo "::notice::Scanning for watched GitHub actions..."
          echo "RAW WATCHED_ACTIONS:"
          printf '%q\n' "$WATCHED_ACTIONS"
          # Skip if not configured
          if [[ -z "$WATCHED_ACTIONS" ]]; then
            echo "::notice::No WATCHED_ACTIONS configured"
            exit 0
          fi

          # Validate JSON
          if ! echo "$WATCHED_ACTIONS" | jq empty; then
            echo "::error::WATCHED_ACTIONS is not valid JSON"
            exit 1
          fi

          mapfile -t watched_actions < <(echo "$WATCHED_ACTIONS" | jq -c '.[]')

          workflow_files=()
          while IFS= read -r file; do
            workflow_files+=("$file")
          done < <(
            find . \( \
              -path "*/.github/workflows/*.yml" -o \
              -path "*/.github/workflows/*.yaml" -o \
              -path "*/action.yml" -o \
              -path "*/action.yaml" \
            \) 2>/dev/null || true
          )

          detected_count=0

          for file in "${workflow_files[@]}"; do
            for action_obj in "${watched_actions[@]}"; do
              action=$(echo "$action_obj" | jq -r '.action')
              message=$(echo "$action_obj" | jq -r '.message')

              [[ -z "$action" ]] && continue

              if grep -q "uses:.*$action" "$file"; then
                detected_count=$((detected_count + 1))
                if [[ "$message" != "null" && -n "$message" ]]; then
                  echo "::warning file=$file::Detected watched action '$action': $message"
                else
                  echo "::warning file=$file::Detected watched action: $action"
                fi
              fi
            done
          done

          if [ "$detected_count" -gt 0 ]; then
            echo "::warning::Found $detected_count instance(s) of watched GitHub actions"
          else
            echo "::notice::No watched GitHub actions detected"
          fi

  zizmor:
    name: Run zizmor from current branch (self test)

    permissions:
      actions: read
      contents: read
      id-token: write
      pull-requests: write
      security-events: write

    needs:
      - zizmor-check
    if: ${{ needs.zizmor-check.outputs.found-files == 'true' }}

    uses: grafana/shared-workflows/.github/workflows/reusable-zizmor.yml@835ea6d866784d0db603612bfbb354d152b62f5c
    with:
      runs-on: ${{ !github.event.repository.private && 'ubuntu-latest' || 'ubuntu-arm64-small' }}
      fail-severity: high
      min-severity: high
      min-confidence: low
      extra-args: --offline
