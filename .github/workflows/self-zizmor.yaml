name: zizmor GitHub Actions static analysis
on:
  push:
  pull_request:
    types:
      - edited
      - opened
      - ready_for_review
      - synchronize
      - reopened
  merge_group:
    types: [checks_requested]

env:
  # Configurable list of GitHub actions to detect and warn about
  WATCHED_ACTIONS: |
    actions/create-github-app-token

jobs:
  zizmor-check:
    name: Check whether there are things to scan
    permissions:
      contents: read
    runs-on: ${{ !github.event.repository.private && 'ubuntu-latest' || 'ubuntu-arm64-small' }}
    outputs:
      found-files: ${{ steps.zizmor-check.outputs.found-files }}
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
      - name: Run zizmor
        id: zizmor-check
        shell: bash
        run: |
          FOUND_FILES=false
          SEARCH=$(find . -path "**/.github/workflows/*.yml" -o -path "**/.github/workflows/*.yaml" -o -path "**/action.yml" -o -path "**/action.yaml")
          if [ -n "$SEARCH" ]; then
              FOUND_FILES=true
          fi
          echo "found-files=${FOUND_FILES}" >> $GITHUB_OUTPUT

      - name: Detect specific GitHub actions
        if: steps.zizmor-check.outputs.found-files == 'true'
        shell: bash
        env:
          WATCHED_ACTIONS: ${{ env.WATCHED_ACTIONS }}
        run: |
          echo "::notice::Scanning for watched GitHub actions..."

          # Convert the multiline WATCHED_ACTIONS to an array
          IFS=$'\n' read -r -d '' -a watched_actions <<< "$WATCHED_ACTIONS" || true

          # Find all workflow and action files
          while IFS= read -r file; do
            workflow_files+=("$file")
          done < <(find . -path "**/.github/workflows/*.yml" -o -path "**/.github/workflows/*.yaml" -o -path "**/action.yml" -o -path "**/action.yaml")

          detected_actions=()

          # Check each workflow file for watched actions
          for file in "${workflow_files[@]}"; do
            for action in "${watched_actions[@]}"; do
              # Skip empty lines
              [[ -z "$action" ]] && continue

              # Search for the action in the file
              if grep -q "uses:.*$action" "$file"; then
                detected_actions+=("$action in $file")
                echo "::warning file=$file::Detected watched action: $action"
              fi
            done
          done

          # Summary
          if [ ${#detected_actions[@]} -gt 0 ]; then
            echo "::warning::Found ${#detected_actions[@]} instance(s) of watched GitHub actions"
            for detected in "${detected_actions[@]}"; do
              echo "  - $detected"
            done
          else
            echo "::notice::No watched GitHub actions detected"
          fi
  zizmor:
    name: Run zizmor from current branch (self test)

    permissions:
      actions: read
      contents: read
      id-token: write
      pull-requests: write
      security-events: write

    needs:
      - zizmor-check
    if: ${{ needs.zizmor-check.outputs.found-files == 'true' }}

    uses: grafana/shared-workflows/.github/workflows/reusable-zizmor.yml@835ea6d866784d0db603612bfbb354d152b62f5c
    with:
      runs-on: ${{ !github.event.repository.private && 'ubuntu-latest' || 'ubuntu-arm64-small' }}
      fail-severity: high
      min-severity: high
      min-confidence: low
      extra-args: --offline
