name: zizmor GitHub Actions static analysis
on:
  push:
  pull_request:
    types:
      - edited
      - opened
      - ready_for_review
      - synchronize
      - reopened
  merge_group:
    types: [checks_requested]
jobs:
  zizmor-check:
    name: Check whether there are things to scan
    permissions:
      contents: read
    runs-on: ${{ !github.event.repository.private && 'ubuntu-latest' || 'ubuntu-arm64-small' }}
    outputs:
      found-files: ${{ steps.zizmor-check.outputs.found-files }}
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
      - name: Run zizmor
        id: zizmor-check
        shell: bash
        run: |
          FOUND_FILES=false
          SEARCH=$(find . -path "**/.github/workflows/*.yml" -o -path "**/.github/workflows/*.yaml" -o -path "**/action.yml" -o -path "**/action.yaml")
          if [ -n "$SEARCH" ]; then
              FOUND_FILES=true
          fi
          echo "found-files=${FOUND_FILES}" >> $GITHUB_OUTPUT
  zizmor:
    name: Run zizmor from current branch (self test)

    permissions:
      actions: read
      contents: read
      id-token: write
      pull-requests: write
      security-events: write

    needs:
      - zizmor-check
    if: ${{ needs.zizmor-check.outputs.found-files == 'true' }}

    uses: grafana/shared-workflows/.github/workflows/reusable-zizmor.yml@835ea6d866784d0db603612bfbb354d152b62f5c
    with:
      runs-on: ${{ !github.event.repository.private && 'ubuntu-latest' || 'ubuntu-arm64-small' }}
      fail-severity: high
      min-severity: high
      min-confidence: low
      extra-args: --offline
  grafana-bench:
    name: Send zizmor metrics to Prometheus via Grafana Bench
    permissions:
      contents: read
    needs:
      - zizmor
    if: ${{ needs.zizmor-check.outputs.found-files == 'true' && !cancelled() && secrets.PROMETHEUS_PUSHGATEWAY_URL != '' }}
    runs-on: ${{ !github.event.repository.private && 'ubuntu-latest' || 'ubuntu-arm64-small' }}
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
      - name: Download SARIF artifacts
        uses: actions/download-artifact@50769540e3f4bd5e9e2f82a8f4223c56c4e33a28 # v4
        continue-on-error: true
        with:
          pattern: '**/*.sarif'
          merge-multiple: false
      - name: Setup Grafana Bench
        run: |
          VERSION="v1.0.0"
          ARCH=$(uname -m)
          if [[ "$ARCH" == "x86_64" ]]; then
            ARCH="amd64"
          elif [[ "$ARCH" == "aarch64" ]]; then
            ARCH="arm64"
          fi
          BINARY_URL="https://github.com/grafana/grafana-bench/releases/download/${VERSION}/grafana-bench_${VERSION#v}_linux_${ARCH}.tar.gz"
          echo "Downloading grafana-bench from: ${BINARY_URL}"
          curl -sSfL "${BINARY_URL}" | tar -xz -C /tmp
          sudo mv /tmp/grafana-bench /usr/local/bin/grafana-bench
          sudo chmod +x /usr/local/bin/grafana-bench
          grafana-bench --version
      - name: Send metrics to Prometheus via Grafana Bench
        continue-on-error: true
        env:
          PROMETHEUS_PUSHGATEWAY_URL: ${{ secrets.PROMETHEUS_PUSHGATEWAY_URL }}
        run: |
          echo "Processing zizmor findings with Grafana Bench..."
          # Find SARIF file (could be in artifact download or current directory)
          SARIF_FILE=$(find . -name "*.sarif" -type f | head -n 1)
          if [ -z "$SARIF_FILE" ]; then
            echo "⚠️  No SARIF file found, skipping grafana-bench processing"
            exit 0
          fi
          echo "Using SARIF file: ${SARIF_FILE}"
          grafana-bench test \
            --service security \
            --service-version ${{ github.sha }} \
            --test-runner zizmor \
            --suite-name ${{ github.repository }}/zizmor \
            --suite-path . \
            --sarif-file "${SARIF_FILE}" \
            --prometheus-metrics \
            --prometheus-url "${PROMETHEUS_PUSHGATEWAY_URL}" \
            --run-stage ci \
            --log-level info
          echo "✅ Metrics sent to Prometheus Pushgateway"
