rules:
  unpinned-uses:
    config:
      policies:
        "*": hash-pin
        actions/*: any
        github/*: any
        grafana/*: any
  forbidden-uses:
    config:
      deny:
        # Policy-banned by our security team due to CVE-2025-30066 & CVE-2025-30154.
        # https://www.cisa.gov/news-events/alerts/2025/03/18/supply-chain-compromise-third-party-tj-actionschanged-files-cve-2025-30066-and-reviewdogaction
        # https://nvd.nist.gov/vuln/detail/cve-2025-30066
        # https://nvd.nist.gov/vuln/detail/cve-2025-30154
        - reviewdog/*
# The supply-chain CLI ships intentionally-broken test fixtures under
# supply-chain/tests/js/fixtures/. Those fixtures contain patterns we WANT
# our own checks to detect (cache-poisoning, missing OIDC, install-not-ci,
# npx confusion). Zizmor correctly finds the same patterns and would flag
# every fixture as a real vulnerability.
#
# The grafana shared-workflows zizmor pipeline replaces this repo-local
# config with a centralized one before running, so a rule-level `ignore:`
# block here is ignored. Suppression is done inline with
# `# zizmor: ignore[<rule>]` comments inside the fixture files themselves.