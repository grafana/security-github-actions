name: publish
on: { push: { tags: ["v*"] } }
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v5 # zizmor: ignore[cache-poisoning] — intentionally bad-pattern test fixture for supply-chain's cache-poisoning-publish check
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm publish
