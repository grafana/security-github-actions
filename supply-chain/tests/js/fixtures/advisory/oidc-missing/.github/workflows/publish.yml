name: publish
on: { push: { tags: ["v*"] } }
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v5 # zizmor: ignore[cache-poisoning] — intentionally bad-pattern test fixture for supply-chain's oidc-publishing check
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org/
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
