name: publish
on: { push: { tags: ["v*"] } }
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org/
          package-manager-cache: false
      - run: npm publish
