# Example: TruffleHog Workflow with Grafana-Bench Integration
#
# This is a reference implementation showing how to add grafana-bench
# to your existing TruffleHog workflow for enhanced Grafana visualization
#
# Copy the relevant sections into your .github/workflows/reusable-trufflehog.yml

# Add these steps after line 201 (after "Upload scan results" step)

      # ====================================================================
      # OPTION 1: Keep Python for Loki, Add Grafana-Bench for Prometheus
      # ====================================================================

      - name: Setup Python for Loki
        if: ${{ !cancelled() && secrets.LOKI_URL != '' }}
        uses: actions/setup-python@0b6a380b5a7827e48e69b2e0e596c5c8c2b0e0b0 # v5.1.0
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        if: ${{ !cancelled() && secrets.LOKI_URL != '' }}
        run: pip install requests

      - name: Send findings to Loki
        if: ${{ !cancelled() && secrets.LOKI_URL != '' }}
        continue-on-error: true
        env:
          LOKI_URL: ${{ secrets.LOKI_URL }}
          LOKI_USERNAME: ${{ secrets.LOKI_USERNAME }}
          LOKI_PASSWORD: ${{ secrets.LOKI_PASSWORD }}
          REPOSITORY: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
          TRUFFLEHOG_RESULTS_FILE: results.json
        run: python trufflehog/send-to-loki.py

      # NEW: Install grafana-bench
      - name: Setup Grafana Bench
        if: ${{ !cancelled() && secrets.PROMETHEUS_PUSHGATEWAY_URL != '' }}
        run: |
          VERSION="v1.0.0"
          ARCH=$(uname -m)

          # Map architecture names
          if [[ "$ARCH" == "x86_64" ]]; then
            ARCH="amd64"
          elif [[ "$ARCH" == "aarch64" ]]; then
            ARCH="arm64"
          fi

          # Download and install
          BINARY_URL="https://github.com/grafana/grafana-bench/releases/download/${VERSION}/grafana-bench_${VERSION#v}_linux_${ARCH}.tar.gz"
          echo "Downloading grafana-bench from: ${BINARY_URL}"

          curl -sSfL "${BINARY_URL}" | tar -xz -C /tmp
          sudo mv /tmp/grafana-bench /usr/local/bin/grafana-bench
          sudo chmod +x /usr/local/bin/grafana-bench

          # Verify installation
          grafana-bench --version

      # NEW: Process findings with grafana-bench
      - name: Send metrics to Prometheus via Grafana Bench
        if: ${{ !cancelled() && secrets.PROMETHEUS_PUSHGATEWAY_URL != '' }}
        continue-on-error: true
        env:
          PROMETHEUS_PUSHGATEWAY_URL: ${{ secrets.PROMETHEUS_PUSHGATEWAY_URL }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          echo "Processing TruffleHog findings with Grafana Bench..."

          grafana-bench test \
            --service ${{ format('grafana-{0}', github.event.repository.name) }} \
            --service-version ${{ github.sha }} \
            --test-runner trufflehog \
            --suite-name ${{ github.repository }}/trufflehog \
            --suite-path . \
            --trufflehog-json-file results.json \
            --prometheus-metrics \
            --prometheus-url "${PROMETHEUS_PUSHGATEWAY_URL}" \
            --run-stage ci \
            --log-level info

          echo "✅ Metrics sent to Prometheus Pushgateway"

      # Keep existing failure policy check
      - name: Check failure policy
        env:
          FAIL_ON_VERIFIED: ${{ inputs.fail-on-verified }}
          FAIL_ON_UNVERIFIED: ${{ inputs.fail-on-unverified }}
          VERIFIED_COUNT: ${{ steps.scan.outputs.verified }}
          UNVERIFIED_COUNT: ${{ steps.scan.outputs.unverified }}
        run: |
          SHOULD_FAIL=false
          if [[ "${FAIL_ON_VERIFIED}" == "true" && "${VERIFIED_COUNT}" != "0" ]]; then
            SHOULD_FAIL=true
          fi
          if [[ "${FAIL_ON_UNVERIFIED}" == "true" && "${UNVERIFIED_COUNT}" != "0" ]]; then
            SHOULD_FAIL=true
          fi

          if [[ "${SHOULD_FAIL}" == "true" ]]; then
            echo "Workflow failed due to secrets found (verified: ${VERIFIED_COUNT}, unverified: ${UNVERIFIED_COUNT})"
            exit 1
          else
            echo "No action needed - secrets within configured thresholds"
          fi


# ====================================================================
# ALTERNATIVE: Use Grafana-Bench Action (Cleaner)
# ====================================================================

      - name: Setup Python for Loki
        if: ${{ !cancelled() && secrets.LOKI_URL != '' }}
        uses: actions/setup-python@0b6a380b5a7827e48e69b2e0e596c5c8c2b0e0b0 # v5.1.0
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        if: ${{ !cancelled() && secrets.LOKI_URL != '' }}
        run: pip install requests

      - name: Send findings to Loki
        if: ${{ !cancelled() && secrets.LOKI_URL != '' }}
        continue-on-error: true
        env:
          LOKI_URL: ${{ secrets.LOKI_URL }}
          LOKI_USERNAME: ${{ secrets.LOKI_USERNAME }}
          LOKI_PASSWORD: ${{ secrets.LOKI_PASSWORD }}
          REPOSITORY: ${{ github.repository }}
